name: Verify site

on:
  push:
  pull_request:

concurrency:
  group: legal-site-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --trace

      - name: Verify required pages
        shell: bash
        run: |
          test -f _site/index.html
          test -f _site/features.html
          test -f _site/support.html
          test -f _site/data-deletion.html
          test -f _site/legal.html
          test -f _site/terms.html
          test -f _site/privacy.html
          test -f _site/tokushoho.html
          test -f _site/404.html
          test -f _site/robots.txt
          test -f _site/sitemap.xml

      - name: Reject stale URLs and placeholders
        shell: bash
        run: |
          ! grep -R "ringedsealstudio.github.io" --exclude-dir=.git --exclude-dir=.github .
          ! grep -R "Premium ¥290" --exclude-dir=.git --exclude-dir=.github .
          ! grep -R "【" --include="*.md" --exclude-dir=.github .
