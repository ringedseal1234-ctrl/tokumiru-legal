title: トクミル
description: 日用品・加工食品の価格を、バーコードや商品画像から見比べる価格比較アプリ
lang: ja
url: https://ringedseal1234-ctrl.github.io
baseurl: /tokumiru-legal
repository: ringedseal1234-ctrl/tokumiru-legal

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /assets/images/og-image.svg
  - scope:
      path: ""
      type: pages
    values:
      lang: ja

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - build/
  - "*.dart"
  - "*.ts"
  - "*.kt"
  - "*.java"
  - "*.swift"
  - "*.gradle"
  - lib/
  - functions/
  - android/
  - ios/
  - src/

strict_front_matter: true
