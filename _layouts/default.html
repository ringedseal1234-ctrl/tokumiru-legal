<!doctype html>
<html lang="{{ page.lang | default: site.lang }}">
  <head>
    {% include head.html %}
  </head>
  <body class="{{ page.body_class | default: "page" }}">
    <a class="skip-link" href="#main-content">本文へ移動</a>
    {% include header.html %}
    <main id="main-content">
      {{ content }}
    </main>
    {% include footer.html %}
    <script src="{{ "/assets/js/main.js" | relative_url }}?v={{ site.time | date: "%Y%m%d%H%M%S" }}" defer></script>
  </body>
</html>
