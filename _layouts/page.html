---
layout: default
---
<header class="page-hero">
  <div class="content-shell content-shell--narrow">
    {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.lead %}<p class="page-hero__lead">{{ page.lead }}</p>{% endif %}
  </div>
</header>
<div class="page-content content-shell content-shell--narrow">
  {{ content }}
</div>
